    </mask>
  </defs>

  <g mask="url(#gear-wrench-mask)">
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(0 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(45 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(90 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(135 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(180 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(225 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(270 50 50)" />
    <rect x="41" y="6" width="18" height="22" rx="4" transform="rotate(315 50 50)" />
    <circle cx="50" cy="50" r="36" />
    <g transform="rotate(-45 50 50)">
      <rect x="44" y="50" width="12" height="35" rx="4" />
      <circle cx="50" cy="50" r="14" />
    </g>
